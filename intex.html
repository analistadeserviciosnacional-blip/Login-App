<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jardines del Renacer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0b3b8c,#2563eb);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:380px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

h1{
    color:#0b3b8c;
    margin-bottom:10px;
    font-size:28px;
}

.subtitulo{
    color:#6b7280;
    margin-bottom:30px;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
    text-align:left;
}

label{
    display:block;
    margin-bottom:8px;
    color:#1e3a8a;
    font-weight:bold;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:15px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 5px rgba(37,99,235,0.4);
}

button{
    width:100%;
    padding:14px;
    background:#0b3b8c;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    background:#2563eb;
}

.error{
    margin-top:15px;
    color:red;
    font-size:14px;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#6b7280;
}

</style>
</head>

<body>

<div class="login-container">

    <!-- LOGO -->
    <img src="LOGO-OFICIAL-JARDINES-15-278x300.png" class="logo">

    <h1>Jardines del Renacer</h1>

    <div class="subtitulo">
        Sistema de Acceso Administrativo
    </div>

    <div class="input-group">
        <label>Usuario</label>
        <input type="text" id="usuario" placeholder="Ingrese usuario">
    </div>

    <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="clave" placeholder="Ingrese contraseña">
    </div>

    <button onclick="login()">
        Ingresar
    </button>

    <div class="error" id="error"></div>

    <div class="footer">
        © 2026 Jardines del Renacer
    </div>

</div>

<script>

function login(){

    let usuario = document.getElementById("usuario").value;
    let clave = document.getElementById("clave").value;

    // VALIDACIÓN SIMPLE
    if(usuario === "admin" && clave === "1234"){

        // CAMBIAR POR TU LINK DE APPSHEET
        window.location.href =
        "https://www.appsheet.com/start/TU_APP_ID";

    }else{

        document.getElementById("error").innerHTML =
        "Usuario o contraseña incorrectos";

    }
}

</script>

</body>
</html>
