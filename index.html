<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal de Acceso — Jardines del Renacer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500;700&display=swap" rel="stylesheet"/>

  <!-- Papa Parse para procesar la base de datos de Google Sheets -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ── CONFIGURACIÓN DE COLORES AZUL Y BLANCO ── */
    :root {
      --jr-blue-dark:  #143a7a; /* Azul profundo */
      --jr-blue-main:  #1e4fa3; /* Azul corporativo */
      --jr-blue-light: #e8f0fe; /* Fondo azul muy claro */
      --jr-white:      #ffffff;
      --jr-text:       #1e293b;
      --transition:    0.3s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Jost', sans-serif;
      background-color: #f4f7fa; /* Gris azulado muy claro */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: var(--jr-text);
    }

    /* Fondo decorativo sutil */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: 
        radial-gradient(circle at 0% 0%, rgba(30,79,163,0.05) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(30,79,163,0.08) 0%, transparent 50%);
      z-index: -1;
    }

    .card {
      display: flex;
      width: min(900px, 100%);
      min-height: 550px;
      background: var(--jr-white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(30,79,163,0.1);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* PANEL IZQUIERDO (AZUL) */
    .panel-left {
      width: 40%;
      background: var(--jr-blue-main);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      text-align: center;
      position: relative;
    }

    .panel-left::after {
      content: "";
      position: absolute;
      width: 150%; height: 150%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      top: -25%; left: -25%;
    }

    .logo-container {
      position: relative; z-index: 2;
      background: white;
      padding: 15px;
      border-radius: 50%;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .logo-img {
      width: 100px; height: 100px;
      object-fit: contain;
    }

    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 0.5rem; position: relative; z-index: 2; }
    .brand-sub { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.8; position: relative; z-index: 2; }

    /* PANEL DERECHO (LOGIN) */
    .panel-right {
      flex: 1;
      padding: 3.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .screen { animation: slideIn 0.4s ease; }
    .hidden { display: none !important; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }

    h1 { font-size: 2rem; color: var(--jr-blue-dark); margin-bottom: 0.5rem; }
    .sub-text { font-size: 0.9rem; color: #64748b; margin-bottom: 2rem; }

    /* INPUTS */
    .field { margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--jr-blue-main); margin-bottom: 0.5rem; text-transform: uppercase; }
    
    input[type="text"], input[type="password"] {
      width: 100%; height: 50px;
      padding: 0 15px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: inherit;
      transition: var(--transition);
      outline: none;
    }

    input:focus { border-color: var(--jr-blue-main); box-shadow: 0 0 0 4px rgba(30,79,163,0.1); }

    /* BOTONES */
    .btn-login {
      width: 100%; height: 55px;
      background: var(--jr-blue-main);
      color: white; border: none;
      border-radius: 10px;
      font-weight: 600; cursor: pointer;
      font-size: 1rem; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .btn-login:hover { background: var(--jr-blue-dark); transform: translateY(-2px); }

    .alert {
      padding: 1rem; border-radius: 8px; margin-bottom: 1rem;
      font-size: 0.85rem; display: none;
    }
    .error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .info { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }

    /* BIENVENIDA */
    #welcome-screen { text-align: center; }
    .welcome-name { font-size: 1.8rem; color: var(--jr-blue-dark); margin-bottom: 1rem; }
    
    .btn-app {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 15px 30px; background: var(--jr-blue-main);
      color: white; text-decoration: none; border-radius: 10px;
      font-weight: 600; margin-top: 1.5rem;
    }

    @media (max-width: 768px) {
      .panel-left { display: none; }
      .panel-right { padding: 2rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="panel-left">
    <div class="logo-container">
      <img id="logo-main" class="logo-img" src="https://www.jardinesdelrenacer.com/wp-content/uploads/2021/04/Logo-Jardines-del-Renacer-300x300.png" alt="Logo">
    </div>
    <h2 class="brand-name">Jardines del Renacer</h2>
    <p class="brand-sub">Prestación de Servicios J.R</p>
  </div>

  <div class="panel-right">
    <!-- LOGIN -->
    <div id="login-screen" class="screen">
      <h1>Iniciar Sesión</h1>
      <p class="sub-text">Acceso exclusivo para personal autorizado</p>

      <div id="alert-error" class="alert error"></div>
      <div id="alert-info" class="alert info"></div>

      <div class="field">
        <label>Usuario</label>
        <input type="text" id="inp-user" placeholder="Ej: perez.juan">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="inp-pass" placeholder="••••••••">
      </div>

      <button class="btn-login" id="btn-login">
        <span>Ingresar al Sistema</span>
      </button>
    </div>

    <!-- BIENVENIDA -->
    <div id="welcome-screen" class="screen hidden">
      <h1 class="welcome-name">¡Hola, <span id="user-name"></span>!</h1>
      <p>Has iniciado sesión correctamente en el portal.</p>
      
      <a href="#" id="link-appsheet" class="btn-app">
        ABRIR PRESTACIÓN DE SERVICIOS J.R
      </a>
      <br><br>
      <button onclick="logout()" style="background:none; border:none; color:#64748b; cursor:pointer; text-decoration:underline;">Cerrar Sesión</button>
    </div>
  </div>
</div>

<script>
/**
 * 🛠 CONFIGURACIÓN PRINCIPAL
 */
const CONFIG = {
  // 1. URL de tu Google Sheet (publicado como CSV)
  DATABASE_URL: 'https://docs.google.com/spreadsheets/d/1TzVTkc7zcF1qd-Y9r9yGmv0KJOG7Asm81Ul442mTng/pub?gid=1544680003&single=true&output=csv',
  
  // 2. URL de tu Aplicación AppSheet (copiada de tu imagen)
  APPSHEET_URL: 'https://www.appsheet.com/start/2e67cb5b-ec0c-4d03-984e-2eed84f55693',
  
  // 3. Logo (puedes cambiar esta URL por cualquier imagen)
  LOGO_URL: 'https://www.jardinesdelrenacer.com/wp-content/uploads/2021/04/Logo-Jardines-del-Renacer-300x300.png'
};

// Aplicar logo
document.getElementById('logo-main').src = CONFIG.LOGO_URL;

const btnLogin = document.getElementById('btn-login');
const alertError = document.getElementById('alert-error');
const alertInfo = document.getElementById('alert-info');

async function handleLogin() {
  const userVal = document.getElementById('inp-user').value.trim();
  const passVal = document.getElementById('inp-pass').value.trim();

  if (!userVal || !passVal) {
    showMsg('error', 'Por favor, completa todos los campos.');
    return;
  }

  showMsg('info', 'Verificando credenciales...');
  btnLogin.disabled = true;

  try {
    // Usamos un proxy para evitar bloqueos de CORS
    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(CONFIG.DATABASE_URL);
    const response = await fetch(proxyUrl);
    const csvData = await response.text();

    // Parsear CSV
    const result = Papa.parse(csvData, { header: true, skipEmptyLines: true });
    const users = result.data;

    // Buscar coincidencia (Usuario, Password, Activo)
    const match = users.find(u => 
      u.Usuario?.toLowerCase() === userVal.toLowerCase() && 
      u.Password === passVal &&
      u.Activo?.toUpperCase() === 'SI'
    );

    if (match) {
      localStorage.setItem('jr_session', JSON.stringify(match));
      showWelcome(match);
    } else {
      showMsg('error', 'Usuario/Contraseña incorrectos o cuenta inactiva.');
      btnLogin.disabled = false;
    }
  } catch (err) {
    showMsg('error', 'Error de conexión con la base de datos.');
    btnLogin.disabled = false;
  }
}

function showWelcome(user) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('welcome-screen').classList.remove('hidden');
  document.getElementById('user-name').textContent = user.Nombre || user.Usuario;
  document.getElementById('link-appsheet').href = CONFIG.APPSHEET_URL;

  // Redirección automática en 2 segundos para agilizar
  setTimeout(() => {
    window.location.href = CONFIG.APPSHEET_URL;
  }, 2000);
}

function showMsg(type, text) {
  alertError.style.display = 'none';
  alertInfo.style.display = 'none';
  const el = type === 'error' ? alertError : alertInfo;
  el.textContent = text;
  el.style.display = 'block';
}

function logout() {
  localStorage.removeItem('jr_session');
  location.reload();
}

// Eventos
btnLogin.addEventListener('click', handleLogin);
document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('keypress', e => { if(e.key === 'Enter') handleLogin(); });
});

// Verificar sesión previa
window.onload = () => {
  const saved = localStorage.getItem('jr_session');
  if (saved) showWelcome(JSON.parse(saved));
};
</script>

</body>
</html>
