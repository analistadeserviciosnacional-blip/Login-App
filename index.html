<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jardines del Renacer — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;700&display=swap" rel="stylesheet"/>

  <!-- Papa Parse para procesar el CSV del Google Sheet -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ── PALETA DE COLORES AZUL Y BLANCO ── */
    :root {
      --jr-blue:   #1e4fa3; /* Azul corporativo */
      --jr-dark:   #143a7a;
      --jr-light:  #f8fafc;
      --jr-border: #e2e8f0;
      --transition: 0.25s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Jost', sans-serif;
      background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }

    /* Fondo decorativo sutil */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(circle at 10% 90%, rgba(30,79,163,0.06) 0%, transparent 50%);
      z-index: -1;
    }

    .card {
      display: flex; width: min(920px, 100%); min-height: 580px;
      background: #fff; border-radius: 24px; overflow: hidden;
      box-shadow: 0 25px 70px rgba(30,79,163,0.12);
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    /* PANEL IZQUIERDO (AZUL) */
    .panel-left {
      width: 45%; background: var(--jr-blue);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 3rem; position: relative; color: #fff; text-align: center;
    }

    .panel-left::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at top right, rgba(255,255,255,0.1), transparent);
    }

    .logo-img {
      width: 120px; height: 120px; background: #fff;
      border-radius: 50%; padding: 12px; margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      position: relative; z-index: 2;
    }

    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 500; position: relative; z-index: 2; }
    .brand-sub { font-size: 0.65rem; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; opacity: 0.7; margin-top: 10px; position: relative; z-index: 2; }

    /* PANEL DERECHO (LOGIN) */
    .panel-right { flex: 1; padding: 3.5rem; display: flex; flex-direction: column; justify-content: center; }

    .greeting { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: #0f172a; margin-bottom: 0.5rem; }
    .greeting em { color: var(--jr-blue); font-style: normal; }
    .sub-text { font-size: 0.85rem; color: #94a3b8; margin-bottom: 2.5rem; font-weight: 300; }

    /* ALERTAS */
    .alert { padding: 14px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 1.5rem; display: none; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .alert.error { background: #fee2e2; border: 1px solid #fecaca; color: #dc2626; }
    .alert.info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }

    /* CAMPOS */
    .field { margin-bottom: 1.5rem; }
    .field label { display: block; font-size: 0.65rem; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    
    .input-wrap { position: relative; }
    input[type="text"], input[type="password"] {
      width: 100%; height: 52px; background: #f8fafc; border: 1.5px solid var(--jr-border);
      border-radius: 12px; padding: 0 16px; font-family: 'Jost', sans-serif;
      font-size: 0.9rem; transition: var(--transition); outline: none;
    }
    input:focus { border-color: var(--jr-blue); background: #fff; box-shadow: 0 0 0 4px rgba(30,79,163,0.08); }

    .eye-btn {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #cbd5e1; cursor: pointer;
    }

    /* BOTÓN */
    .btn-login {
      width: 100%; height: 56px; background: var(--jr-blue); color: #fff;
      border: none; border-radius: 12px; font-weight: 700; font-size: 0.85rem;
      letter-spacing: 2px; cursor: pointer; transition: var(--transition);
      box-shadow: 0 12px 30px rgba(30,79,163,0.2); margin-top: 1rem;
    }
    .btn-login:hover { background: var(--jr-dark); transform: translateY(-2px); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* PANTALLA BIENVENIDA */
    .welcome-screen { text-align: center; }
    .welcome-name { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: #0f172a; margin-top: 1rem; }
    .btn-open-app {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 16px 35px; background: var(--jr-blue); color: white;
      text-decoration: none; border-radius: 12px; font-weight: 700;
      margin-top: 2rem; box-shadow: 0 10px 25px rgba(30,79,163,0.25);
    }

    .hidden { display: none !important; }

    @media (max-width: 720px) {
      .panel-left { display: none; }
      .panel-right { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <!-- IZQUIERDA -->
  <div class="panel-left">
    <img class="logo-img" src="https://www.jardinesdelrenacer.com/wp-content/uploads/2021/04/Logo-Jardines-del-Renacer-300x300.png" alt="Logo">
    <h2 class="brand-name">Jardines del Renacer</h2>
    <p class="brand-sub">Prestación de Servicios</p>
  </div>

  <!-- DERECHA -->
  <div class="panel-right">
    
    <!-- LOGIN FORM -->
    <div id="login-screen">
      <h1 class="greeting">Bienvenido<em>.</em></h1>
      <p class="sub-text">Ingresa tus credenciales para acceder al sistema</p>

      <div id="alert-msg" class="alert"></div>

      <div class="field">
        <label>Usuario</label>
        <input type="text" id="inp-user" placeholder="Ej: admin.jr" autocomplete="off">
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="inp-pass" placeholder="••••••••">
          <button class="eye-btn" id="toggle-pass" type="button">👁️</button>
        </div>
      </div>

      <button class="btn-login" id="btn-login">INGRESAR AL PORTAL</button>

      <p style="text-align: center; margin-top: 2rem; font-size: 0.65rem; color: #cbd5e1; letter-spacing: 2px;">
        © 2026 JARDINES DEL RENACER
      </p>
    </div>

    <!-- BIENVENIDA -->
    <div id="welcome-screen" class="hidden welcome-screen">
      <img src="https://www.jardinesdelrenacer.com/wp-content/uploads/2021/04/Logo-Jardines-del-Renacer-300x300.png" style="width: 80px; height: 80px; opacity: 0.5;">
      <h1 class="welcome-name" id="user-display">Hola</h1>
      <p id="user-role" style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 3px; color: #94a3b8;"></p>
      
      <p style="margin-top: 1.5rem; color: #64748b; font-style: italic;">Conexión exitosa. Redirigiendo...</p>

      <a id="btn-redirect" class="btn-open-app" href="#">
        ABRIR APLICACIÓN
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>

  </div>
</div>

<script>
  // ⚙️ CONFIGURACIÓN
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/1TzVTkc7zcF1qd-Y9r9yGmv0KJOG7Asm81Ul442mTng/pub?gid=1544680003&single=true&output=csv';
  const APP_URL = 'https://www.appsheet.com/start/2e67cb5b-ec0c-4d03-984e-2eed84f55693';

  const btnLogin = document.getElementById('btn-login');
  const alertMsg = document.getElementById('alert-msg');

  // Alternar Ver Contraseña
  document.getElementById('toggle-pass').addEventListener('click', function() {
    const p = document.getElementById('inp-pass');
    p.type = p.type === 'password' ? 'text' : 'password';
  });

  async function manejarLogin() {
    const user = document.getElementById('inp-user').value.trim();
    const pass = document.getElementById('inp-pass').value.trim();

    if(!user || !pass) {
      mostrarAlerta('error', 'Por favor completa todos los campos.');
      return;
    }

    mostrarAlerta('info', 'Verificando credenciales...');
    btnLogin.disabled = true;

    try {
      // Usamos un proxy para evitar bloqueos CORS
      const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL);
      const res = await fetch(proxy);
      const csvText = await res.text();

      const result = Papa.parse(csvText, { header: true, skipEmptyLines: true });
      const db = result.data;

      // Validación
      const match = db.find(u => 
        String(u.Usuario || u.usuario).toLowerCase() === user.toLowerCase() &&
        String(u.Password || u.password) === pass &&
        String(u.Activo || u.activo).toUpperCase() === 'SI'
      );

      if(match) {
        exito(match);
      } else {
        mostrarAlerta('error', 'Usuario o contraseña incorrectos.');
        btnLogin.disabled = false;
      }

    } catch (err) {
      mostrarAlerta('error', 'Error al conectar con la base de datos.');
      btnLogin.disabled = false;
    }
  }

  function mostrarAlerta(tipo, texto) {
    alertMsg.className = 'alert ' + tipo;
    alertMsg.textContent = texto;
    alertMsg.style.display = 'block';
  }

  function exito(u) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('welcome-screen').classList.remove('hidden');
    
    document.getElementById('user-display').textContent = "¡Hola, " + (u.Nombre || u.nombre || "Usuario") + "!";
    document.getElementById('user-role').textContent = u.Rol || u.rol || "Personal";
    document.getElementById('btn-redirect').href = APP_URL;

    // Redirección automática en 2.5 segundos
    setTimeout(() => {
      window.location.href = APP_URL;
    }, 2500);
  }

  btnLogin.addEventListener('click', manejarLogin);

  // Permitir "Enter" para entrar
  document.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') manejarLogin();
  });
</script>

</body>
</html>
